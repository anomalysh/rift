# rift local development stack.
#
# There is no Caddy and no public DNS locally, so riftd's ports are published
# straight to the host and you reach a tunnel by sending the Host header
# yourself, e.g.:
#     curl -H 'Host: myapp.rift.anomaly.sh' http://127.0.0.1:8080/
#
# Production layers deploy/docker-compose.prod.yml on top of this file, which
# adds Caddy, stops publishing riftd's ports, and sets restart policies.
name: rift

services:
  postgres:
    image: postgres:16-alpine
    environment:
      # Local throwaway credentials for the dev database only — NOT production.
      POSTGRES_USER: ${POSTGRES_USER:-rift}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rift}
      POSTGRES_DB: ${POSTGRES_DB:-rift}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rift} -d ${POSTGRES_DB:-rift}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # Optional multi-node routing backend, off by default. Enable it with
    # `docker compose --profile redis up` AND set RIFT_REDIS_ENABLED=true so
    # riftd actually connects (RIFT_REDIS_ENABLED defaults to false).
    profiles: ["redis"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  riftd:
    build:
      # Context is the repo root so the build can reach server/; the same
      # relative layout exists on the VPS (/opt/rift) after remote-deploy.
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      # --- required ---
      # Local dev gets a working default DSN pointed at the postgres service.
      RIFT_POSTGRES_DSN: ${RIFT_POSTGRES_DSN:-postgres://rift:rift@postgres:5432/rift?sslmode=disable}
      RIFT_BASE_DOMAIN: ${RIFT_BASE_DOMAIN:-rift.anomaly.sh}
      # Dev-only throwaway admin token; production must set a >=32 char secret.
      RIFT_ADMIN_TOKEN: ${RIFT_ADMIN_TOKEN:-dev-admin-token-change-me-please}
      # --- environment / listeners ---
      RIFT_ENV: ${RIFT_ENV:-development}
      RIFT_LOG_LEVEL: ${RIFT_LOG_LEVEL:-info}
      RIFT_LOG_FORMAT: ${RIFT_LOG_FORMAT:-json}
      RIFT_INGRESS_ADDR: ${RIFT_INGRESS_ADDR:-:8080}
      RIFT_GATEWAY_ADDR: ${RIFT_GATEWAY_ADDR:-:8081}
      # Read by the TLS-ask endpoint so Caddy may issue a certificate for the
      # hostname agents dial. Empty in local dev, where there is no TLS.
      RIFT_GATEWAY_HOSTNAME: ${RIFT_GATEWAY_HOSTNAME:-}
      # riftd validates the TLS mode even though Caddy is what uses it, so a
      # bad value fails the stack at boot. Local dev has no TLS: internal.
      RIFT_TLS_MODE: ${RIFT_TLS_MODE:-internal}
      RIFT_ACME_DNS_PROVIDER: ${RIFT_ACME_DNS_PROVIDER:-}
      RIFT_TLS_CERT_FILE: ${RIFT_TLS_CERT_FILE:-}
      RIFT_TLS_KEY_FILE: ${RIFT_TLS_KEY_FILE:-}
      RIFT_ADMIN_ADDR: ${RIFT_ADMIN_ADDR:-:8082}
      # --- redis (only consulted when RIFT_REDIS_ENABLED=true + --profile redis) ---
      RIFT_REDIS_ENABLED: ${RIFT_REDIS_ENABLED:-false}
      RIFT_REDIS_ADDR: ${RIFT_REDIS_ADDR:-redis:6379}
      RIFT_REDIS_PASSWORD: ${RIFT_REDIS_PASSWORD:-}
      # Required only for multi-node (RIFT_REDIS_ENABLED=true); empty otherwise.
      RIFT_PEER_SECRET: ${RIFT_PEER_SECRET:-}
    ports:
      # Local only. The prod override clears these with `ports: !reset []`.
      - "8080:8080" # ingress
      - "8081:8081" # gateway
      - "8082:8082" # admin (never published in production)
    depends_on:
      postgres:
        condition: service_healthy
    # NB: redis is intentionally omitted from depends_on — it lives behind a
    # profile, and depending on a disabled-profile service would break startup.

volumes:
  postgres_data:
