# rift production overlay. Apply on top of the base file:
#     docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# All secrets come from an untracked .env sitting next to these files; nothing
# sensitive is inlined here.

services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  riftd:
    restart: unless-stopped
    # In production riftd sits entirely behind Caddy on the private compose
    # network; its ports must NEVER be published to the host. !reset clears the
    # dev port mappings inherited from the base file.
    ports: !reset []
    environment:
      RIFT_ENV: ${RIFT_ENV:-production}
      RIFT_PUBLIC_SCHEME: ${RIFT_PUBLIC_SCHEME:-https}
      # Behind Caddy, so trust the X-Forwarded-* it sets. Caddy reaches riftd by
      # the compose service DNS name; trust that source.
      RIFT_INGRESS_TRUSTED_PROXY_IPS: ${RIFT_INGRESS_TRUSTED_PROXY_IPS:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - riftd
    # Only Caddy publishes host ports. 443/udp serves HTTP/3.
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      # Consumed by {$VAR} placeholders in caddy/Caddyfile at Caddy start-up.
      RIFT_BASE_DOMAIN: ${RIFT_BASE_DOMAIN:-rift.anomaly.sh}
      RIFT_GATEWAY_HOSTNAME: ${RIFT_GATEWAY_HOSTNAME:-gateway.rift.anomaly.sh}
      RIFT_ACME_EMAIL: ${RIFT_ACME_EMAIL:-}
      RIFT_UPSTREAM_HOST: ${RIFT_UPSTREAM_HOST:-riftd}
      RIFT_INGRESS_PORT: ${RIFT_INGRESS_PORT:-8080}
      RIFT_GATEWAY_PORT: ${RIFT_GATEWAY_PORT:-8081}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      # caddy_data holds issued certificates and the ACME account key. Losing it
      # forces re-issuance on the next boot and can trip Let's Encrypt duplicate
      # -certificate rate limits, so it MUST persist in a named volume.
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
