name: release

# Cut a release when a version tag is pushed. Builds every rift target, verifies
# checksums, and uploads the artifacts + SHA256SUMS to the GitHub release.
on:
  push:
    tags:
      - "v*"

# Least privilege: this workflow only needs to write release assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions are pinned to full commit SHAs (immutable) with the
      # human-readable version in a trailing comment, per supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install, typecheck, test
        working-directory: projects/cli
        run: |
          bun install --frozen-lockfile
          bun run typecheck
          bun test

      - name: Build release artifacts
        run: tools/release.sh --clean

      # A fresh checkout builds exactly one version dir under dist/release/, so
      # the glob resolves unambiguously; SHA256SUMS lets consumers verify.
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/release/*/rift-*
            dist/release/*/SHA256SUMS
          fail_on_unmatched_files: true
