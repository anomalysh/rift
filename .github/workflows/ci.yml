name: ci

# Build, lint, and test on every branch push and pull request. Kept
# secret-free so it also passes on pull requests opened from forks.
#
# The whole toolchain (Go, Bun, biome) and every check come from mise: CI runs
# the same `mise run ci` task used locally, at the exact pinned versions. That
# task depends on the per-project install/deps tasks, so it fetches dependencies
# (with the network) before the network-denied checks run offline. One source of
# truth for local and CI. See https://mise.jdx.dev/continuous-integration.html.
on:
  push:
  pull_request:
  workflow_dispatch:

# One in-flight run per ref; a new push cancels the previous run for that ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the checked-out code.
permissions:
  contents: read

jobs:
  ci:
    name: ci (mise)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # A real Postgres so the store tests run instead of skipping (see the DSN
    # below); the mise `ci` task runs the server suite with -race against it.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rift
          POSTGRES_PASSWORD: rift
          POSTGRES_DB: rift_test
        ports:
          - 5432:5432
        # Gate the job's DB access on readiness rather than racing start-up.
        options: >-
          --health-cmd "pg_isready -U rift -d rift_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      # Third-party actions are pinned to full commit SHAs (immutable) with the
      # human-readable version in a trailing comment, per supply-chain hardening.
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # mise installs the pinned Go, Bun, and biome from the repo's mise.toml.
      - name: Set up mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Cache Go modules and build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('projects/server/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run CI
        # One task fans out to lint, type-check, build, test, and CVE-scan across
        # both projects (parallel, with dependency ordering). GO_TEST_FLAGS adds
        # the race detector; RIFT_TEST_POSTGRES_DSN points the store tests at the
        # service container so they run instead of skipping.
        env:
          GO_TEST_FLAGS: -race
          RIFT_TEST_POSTGRES_DSN: postgres://rift:rift@localhost:5432/rift_test?sslmode=disable
        run: mise run ci

  scripts:
    name: scripts (shell + compose)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Syntax-check shell scripts
        run: bash -n tools/*.sh tools/lib/*.sh tools/recovery/*.sh tools/providers/*.sh

      - name: Shellcheck
        # --severity=warning keeps intentional idioms advisory: `cmd && x || true`
        # (SC2015) and single-quoted snippets passed to a remote sh (SC2016) are
        # deliberate, not bugs. Errors and warnings still fail the job.
        # tools/install.sh is POSIX sh (the curl | sh installer); check it as sh
        # so it is not flagged for legitimately avoiding bashisms. -x follows the
        # `. lib/common.sh` sources.
        run: |
          bash_scripts="$(ls tools/*.sh tools/lib/*.sh tools/recovery/*.sh tools/providers/*.sh | grep -v '^tools/install.sh$')"
          shellcheck -x --severity=warning $bash_scripts
          shellcheck -x -s sh --severity=warning tools/install.sh

      - name: Validate compose (dev)
        run: docker compose -f deploy/docker-compose.yml config -q

      - name: Validate compose (prod overlay)
        # The prod overlay declares RIFT_TLS_MODE as required (${VAR:?...}) so a
        # missing TLS mode fails the stack rather than the first handshake;
        # supply a valid value so `config` can render.
        run: RIFT_TLS_MODE=http01 docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.prod.yml config -q

  e2e:
    name: e2e (docker)
    runs-on: ubuntu-latest
    # Builds container images and drives two TLS modes end to end.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # The harness builds the CLI from source when projects/cli/dist/rift is
      # absent; mise provides the pinned Bun to build it.
      - name: Set up mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3

      - name: Run e2e
        # --verbose streams container logs on failure into the captured log.
        run: make e2e ARGS=--verbose 2>&1 | tee e2e.log

      - name: Upload harness logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-logs
          path: e2e.log
          if-no-files-found: warn
