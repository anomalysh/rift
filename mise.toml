[tools]
# Pin the Go toolchain so local builds match CI and the server Docker image, and
# stay current with standard-library security fixes (see server/go.mod). Bumping
# here should move alongside deploy/Dockerfile and .github/workflows/ci.yml.
go = "1.25"
bun = "1.3.14"

# Dev-workflow tasks: run with `mise run <name>` (or `mise <name>`), list with
# `mise tasks`. Ops workflows (deploy, provision, backup, …) stay in the Makefile.

[tasks."cli:lint"]
description = "Lint the CLI with biome"
dir = "cli"
run = "bun run lint"

[tasks."cli:typecheck"]
description = "Type-check the CLI (tsc)"
dir = "cli"
run = "bun run typecheck"

[tasks."cli:test"]
description = "Run the CLI test suite"
dir = "cli"
run = "bun test"

[tasks."cli:build"]
description = "Compile the CLI single binary"
dir = "cli"
run = "bun run build"

[tasks."server:build"]
description = "Build the server"
dir = "server"
run = "go build ./..."

[tasks."server:vet"]
description = "Vet the server"
dir = "server"
run = "go vet ./..."

[tasks."server:gofmt"]
description = "Fail on any gofmt drift"
dir = "server"
run = '''
drift="$(gofmt -l .)"
[ -z "$drift" ] || { printf 'gofmt drift:\n%s\n' "$drift" >&2; exit 1; }
'''

[tasks."server:test"]
description = "Run the server test suite"
dir = "server"
run = "go test ./..."

[tasks."server:vuln"]
description = "Scan the server for known CVEs (govulncheck)"
dir = "server"
run = "go run golang.org/x/vuln/cmd/govulncheck@latest ./..."

[tasks.gen-docs]
description = "Regenerate the man page and shell completions"
run = "make gen-docs"

[tasks.e2e]
description = "Full black-box e2e in Docker"
run = "make e2e"

[tasks.check]
description = "Lint, type-check, and test everything"
depends = [
  "cli:lint",
  "cli:typecheck",
  "cli:test",
  "server:gofmt",
  "server:vet",
  "server:build",
  "server:test",
]

[tasks.pre-commit]
description = "Fast checks run by the git pre-commit hook"
depends = ["cli:lint", "cli:typecheck", "cli:test", "server:gofmt", "server:vet"]

# .git/hooks is not tracked, so each clone installs the hook once with
# `mise run install-hooks` (or `mise generate git-pre-commit --write`).
[tasks.install-hooks]
description = "Install the git pre-commit hook (run once per clone)"
run = "mise generate git-pre-commit --task pre-commit --write"
