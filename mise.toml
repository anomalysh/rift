# Monorepo root. Each project under projects/ carries its own mise.toml with the
# tasks that belong to it; this file wires them together and pins the shared
# toolchain. Run a project task from anywhere with `mise //projects/<p>:<task>`,
# or `mise :<task>` from inside a project directory; `mise //...:test` fans out.
monorepo_root = true

[monorepo]
# Single-level globs are allowed here, but the layout is small enough to list.
config_roots = ["projects/cli", "projects/server", "projects/manual"]

[tools]
# Pin the toolchain so local builds match CI and the server Docker image, and
# stay current with standard-library security fixes (see projects/server/go.mod).
# Bumping here should move alongside deploy/Dockerfile and .github/workflows/ci.yml.
# Shared at the root so every project inherits the same go/bun.
go = "1.25"
bun = "1.3.14"

# Aggregate tasks span projects, so they live at the root and depend on the
# per-project tasks by absolute reference. Ops workflows (deploy, provision,
# backup, …) stay in the Makefile.
# The one task CI runs (`mise run ci`), and the same one to run everything
# locally. CI adds -race and a Postgres DSN via env; see .github/workflows/ci.yml.
[tasks.ci]
description = "Everything CI runs: lint, type-check, build, test, and CVE-scan"
depends = [
  "//projects/cli:lint",
  "//projects/cli:typecheck",
  "//projects/cli:test",
  "//projects/cli:build",
  "//projects/server:gofmt",
  "//projects/server:vet",
  "//projects/server:build",
  "//projects/server:test",
  "//projects/server:vuln",
]

[tasks.pre-commit]
description = "Fast checks run by the git pre-commit hook"
depends = [
  "//projects/cli:lint",
  "//projects/cli:typecheck",
  "//projects/cli:test",
  "//projects/server:gofmt",
  "//projects/server:vet",
]

[tasks.gen-docs]
description = "Regenerate the man page and shell completions"
run = "make gen-docs"

[tasks.e2e]
description = "Full black-box e2e in Docker"
run = "make e2e"

# .git/hooks is not tracked, so each clone installs the hook once with
# `mise run install-hooks` (or `mise generate git-pre-commit --write`).
[tasks.install-hooks]
description = "Install the git pre-commit hook (run once per clone)"
run = "mise generate git-pre-commit --task pre-commit --write"
