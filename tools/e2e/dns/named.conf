// Authoritative-only BIND for the rift e2e. Pebble queries it to validate
// DNS-01 challenges, and Caddy's rfc2136 solver writes the challenge TXT
// records into it over a TSIG-signed dynamic update -- the same mechanism a
// production self-hosted zone would use.
options {
	directory "/var/cache/bind";
	listen-on port 53 { any; };
	listen-on-v6 { none; };
	recursion no;
	allow-query { any; };
	dnssec-validation no;
	pid-file none;
};

// TEST KEY. Fixed so the harness is reproducible. It grants update rights to
// one throwaway zone inside one throwaway container and authenticates nothing
// beyond it.
key "rift-e2e." {
	algorithm hmac-sha256;
	secret "c2VjcmV0LXJpZnQtZTJlLXRlc3Qta2V5LW5vdC1hLXNlY3JldA==";
};

zone "rift.localtest" {
	type primary;
	file "/var/lib/bind/db.rift.localtest";
	// Only the TSIG-signed key may write, and only into this zone. This is the
	// property that makes rfc2136 acceptable for a real deployment.
	allow-update { key "rift-e2e."; };
};
